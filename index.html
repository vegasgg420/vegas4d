  <style amp-custom>

    html,body{

    .header-utils {

    .util-btn {

    }

    main{
      max-width:500px;
      margin:0 auto;
      padding:16px;
    }

    .spacer{height:12px}

    .block-img{
      position:relative;
      margin:16px auto 20px;
      min-width:100px;
      background:linear-gradient(0deg,#000,#272727);
      border-radius:10px;
      overflow:hidden;
    }
    .block-img::before,
    .block-img::after{
      content:"";
      position:absolute;
      right:-3px;
      bottom:-3px;
      width:calc(100% + 6px);
      height:calc(100% + 6px);
      z-index:-1;
      background:linear-gradient(90deg, #871737 0, #1f4181 49%, #871737);
      background-size:400%;
      animation:steam 5s linear infinite;
      border-radius:12px;
    }
    .block-img::after{ filter: blur(50px); }

    /* amp-img pakai class banner */
    .banner{
      border-radius:10px;
      overflow:hidden;
    }

    .login-btn {
      display:grid;
      gap:14px;
      margin-bottom:20px;
    }

    .block{
      position:relative;
      padding:12px 10px;
      text-align:center;
      background:linear-gradient(0deg,#000,#272727);
      color:#fff;
      border-radius:10px;

      cursor:pointer;
      letter-spacing:.3px;
      font-weight:700;
      overflow:hidden;
      z-index:1;
    }

    .block::before,
    .block::after{
      content:"";
      position:absolute;
      right:-3px;
      bottom:-3px;
      width:calc(100% + 6px);
      height:calc(100% + 6px);
      z-index:-1;
      background-size:300% 300%;
      animation:glowBorder 4s linear infinite;
      border-radius:12px;
    }

    .block::after{ filter:blur(30px); }

    .btn-daftar{

    }
    .btn-daftar::before,
    .btn-daftar::after{

    }

    .btn-login{

    }
    .btn-login::before,
    .btn-login::after{

    }

    @keyframes glowBorder{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    /* duplikat block di CSS kamu tetap aku biarin (sesuai request “jangan diubah”) */
    .block{
      position:relative;
      padding:12px 10px;
      text-align:center;
      background:linear-gradient(0deg,#000,#272727);
      color:#fff;
      border-radius:10px;

      background:linear-gradient(90deg,#471525,#13162f);
      background-size:400%;
      animation:steam 5s linear infinite;
      border-radius:12px;
    }
    .block::after{ filter:blur(50px); }

    .artikel{

    *{

    @keyframes steam{

    @keyframes pulseScale {
        0% { transform: scale(1); }
        50% { transform: scale(1.08); }
